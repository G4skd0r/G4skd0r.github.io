<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Campus</title>
  <link rel="stylesheet" href="campus_styles.css">
</head>
<body>
  <!-- Navbar con logo a la izquierda y en el lado derecho "Mi Calendario" y "Log Out" -->
  <nav class="navbar">
    <a href="mi_campus.html" class="logo" style="color: white; text-decoration: none;">Being Humans</a>
    <ul class="nav-links-right">
    <li><a href="mi_calendario.html">Mi Calendario</a></li>
    <li><a href="campus.html">Log Out</a></li> <!-- Redirige a campus.html -->
  </ul>
</nav>


  <!-- Contenedor principal con tres columnas -->
  <div class="campus-container">
    <!-- Columna Izquierda: Botones de navegación -->
    <div class="campus-column left-column">
      <button class="btn-campus" onclick="location.href='mi_formacion.html'">Formación</button>
      <button class="btn-campus" onclick="location.href='mi_comunidad.html'">Comunidad</button>
    </div>

    <!-- Columna Central: Notificación y cartel de información -->
    <div class="campus-column middle-column">
      <div class="notification">
        <h3>¡Qué lindo verte de nuevo, Francisco!</h3>
      </div>
      <div class="forum-card">
        <p>Esta semana tenés clases con <strong>@Pepe</strong> sobre comunicación y expresión y con <strong>@Lore</strong> sobre meditación.</p>
        <p>Además tenés tu encuentro mensual de <strong>#entrepares</strong>.</p>
        <p><strong>#Semanamanija.</strong></p>
      </div>
    </div>

    <!-- Columna Derecha: Barra de progreso y botones de acceso a clases -->
    <div class="campus-column right-column">
      <!-- Barra de progreso más sutil con título -->
      <div class="progress-section">
        <span class="progress-title">Mi progreso</span>
        <div class="progress-container">
          <div class="progress-bar" style="width: 43%;"></div>
        </div>
      </div>

      <!-- Botones de acceso a clases -->
      <button class="btn-campus" onclick="location.href='#'">Acceso a la clase de comunicación y expresión con Pepe</button>
      <button class="btn-campus" onclick="location.href='#'">Acceso a la clase de meditación con Lore</button>
      <button class="btn-campus" onclick="location.href='#'">Acceso a reunión #entrepares</button>
    </div>
  </div>
</body>
</html>
